version: '3.8'

services:
  nomnomstock:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH}
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
        BASE_PATH: ${BASE_PATH}
        APP_URL: ${APP_URL}
        NEXTAUTH_URL: ${NEXTAUTH_URL}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/data/nomnom.db
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      APP_URL: ${APP_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      BASE_PATH: ${BASE_PATH}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
      NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
      OLLAMA_URL: ${OLLAMA_URL}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
    volumes:
      - data:/data
    ports:
      - "8069:3000"

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.prod
    depends_on:
      - nomnomstock
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/data/nomnom.db
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    volumes:
      - data:/data
    command: sh -c "npx prisma generate && npx prisma migrate deploy && if [ -f /app/prisma/seed.js ]; then node /app/prisma/seed.js || true; fi"
    restart: 'no'

  studio:
    build:
      context: .
      dockerfile: Dockerfile.prod
    depends_on:
      - nomnomstock
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/data/nomnom.db
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    volumes:
      - data:/data
    ports:
      - "8068:3001"
    command: sh -c "npx prisma generate && npx prisma studio --port 3001 --host 0.0.0.0"
    restart: 'no'

volumes:
  data:
