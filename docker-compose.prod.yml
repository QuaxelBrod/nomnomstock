x-app-build: &app-build
  context: .
  dockerfile: Dockerfile.prod
  args:
    APP_URL: ${APP_URL:-http://localhost:3000}
    NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
    BASE_PATH: ${BASE_PATH:-}
    NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
    NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
    BACKEND_URL: ${BACKEND_URL:-http://backend:3001}
    NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://backend:3001}

services:
  offers:
    image: nomnomstock-app:local
    build: *app-build
    restart: unless-stopped
    command: pnpm --filter nomnomstock-offers run start
    environment:
      NODE_ENV: production
      PORT: 3010
      OFFERS_DATABASE_URL: file:/data/offers/offers.db
      OFFERS_SERVICE_TOKEN: ${OFFERS_SERVICE_TOKEN:-dev-offers-token}
      OFFERS_SCHEDULER_ENABLED: ${OFFERS_SCHEDULER_ENABLED:-true}
      OFFERS_REFRESH_HOUR: ${OFFERS_REFRESH_HOUR:-6}
      OFFERS_HISTORY_RETENTION_DAYS: ${OFFERS_HISTORY_RETENTION_DAYS:-180}
      OFFERS_VISION_ENABLED: ${OFFERS_VISION_ENABLED:-false}
      OFFERS_VISION_BASE_URL: ${OFFERS_VISION_BASE_URL:-}
      OFFERS_VISION_MODEL: ${OFFERS_VISION_MODEL:-}
      OFFERS_VISION_API_KEY: ${OFFERS_VISION_API_KEY:-}
      OFFERS_FETCH_TIMEOUT_MS: ${OFFERS_FETCH_TIMEOUT_MS:-15000}
    volumes:
      - offers-data:/data/offers
    expose:
      - '3010'

  backend:
    image: nomnomstock-app:local
    build: *app-build
    depends_on:
      - offers
    restart: unless-stopped
    command: pnpm --filter nomnomstock-backend run start
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: file:/data/nomnom.db
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      ADMIN_MAINTENANCE_TOKEN: ${ADMIN_MAINTENANCE_TOKEN:-}
      APP_URL: ${APP_URL:-http://localhost:3000}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8069/api/v1}
      BASE_PATH: ${BASE_PATH:-}
      NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      UPLOAD_DIR: /data/uploads
      EMAIL_AUTH_ENABLED: ${EMAIL_AUTH_ENABLED:-true}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-admin@example.com}
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_ENABLED: ${LLM_ENABLED:-true}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS:-60000}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-1024}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.7}
      OLLAMA_URL: ${OLLAMA_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-cortex}
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-true}
      OFFERS_SERVICE_URL: ${OFFERS_SERVICE_URL:-http://offers:3010}
      OFFERS_SERVICE_TOKEN: ${OFFERS_SERVICE_TOKEN:-dev-offers-token}
    volumes:
      - data:/data
    ports:
      - '${ADMIN_MAINTENANCE_BIND_IP:-192.168.178.29}:${ADMIN_MAINTENANCE_PORT:-8070}:3001'
    expose:
      - '3001'

  web:
    image: nomnomstock-app:local
    depends_on:
      - backend
    restart: unless-stopped
    command: pnpm --filter nomnomstock-web exec next start --hostname 0.0.0.0 --port 3000
    environment:
      NODE_ENV: production
      APP_URL: ${APP_URL:-http://localhost:3000}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      BASE_PATH: ${BASE_PATH:-}
      NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
      BACKEND_URL: ${BACKEND_URL:-http://backend:3001}
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://backend:3001}
    ports:
      - '8069:3000'

  migrate:
    image: nomnomstock-app:local
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/data/nomnom.db
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    volumes:
      - data:/data
    command: >-
      sh -c "mkdir -p /data && touch /data/nomnom.db
      && pnpm --filter nomnomstock-backend exec prisma generate
      && pnpm --filter nomnomstock-backend exec prisma migrate deploy
      && if [ -f /app/backend/prisma/seed.js ]; then node /app/backend/prisma/seed.js || true; fi"
    restart: 'no'

  studio:
    image: nomnomstock-app:local
    profiles:
      - tools
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/data/nomnom.db
    volumes:
      - data:/data
    ports:
      - '8068:3001'
    command: pnpm --filter nomnomstock-backend exec prisma studio --port 3001 --hostname 0.0.0.0 --browser none
    restart: 'no'

volumes:
  data:
  offers-data:
