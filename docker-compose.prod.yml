x-app-build: &app-build
  context: .
  dockerfile: Dockerfile.prod
  args:
    APP_URL: ${APP_URL:-http://localhost:3000}
    NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
    BASE_PATH: ${BASE_PATH:-}
    NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
    NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
    BACKEND_URL: ${BACKEND_URL:-http://backend:3001}
    NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://backend:3001}

services:
  backend:
    image: nomnomstock-app:local
    build: *app-build
    restart: unless-stopped
    command: pnpm --filter nomnomstock-backend run start
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: file:/data/nomnom.db
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      APP_URL: ${APP_URL:-http://localhost:3000}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      BASE_PATH: ${BASE_PATH:-}
      NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      UPLOAD_DIR: /data/uploads
      EMAIL_AUTH_ENABLED: ${EMAIL_AUTH_ENABLED:-true}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-admin@example.com}
      OLLAMA_URL: ${OLLAMA_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-cortex}
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-true}
    volumes:
      - data:/data
    expose:
      - '3001'

  web:
    image: nomnomstock-app:local
    depends_on:
      - backend
    restart: unless-stopped
    command: pnpm --filter nomnomstock-web run start -- --hostname 0.0.0.0 --port 3000
    environment:
      NODE_ENV: production
      APP_URL: ${APP_URL:-http://localhost:3000}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      BASE_PATH: ${BASE_PATH:-}
      NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
      BACKEND_URL: ${BACKEND_URL:-http://backend:3001}
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://backend:3001}
    ports:
      - '8069:3000'

  migrate:
    image: nomnomstock-app:local
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/data/nomnom.db
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    volumes:
      - data:/data
    command: >-
      sh -c "mkdir -p /data && touch /data/nomnom.db
      && pnpm --filter nomnomstock-backend exec prisma generate
      && pnpm --filter nomnomstock-backend exec prisma migrate deploy
      && if [ -f /app/backend/prisma/seed.js ]; then node /app/backend/prisma/seed.js || true; fi"
    restart: 'no'

  studio:
    image: nomnomstock-app:local
    profiles:
      - tools
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/data/nomnom.db
    volumes:
      - data:/data
    ports:
      - '8068:3001'
    command: pnpm --filter nomnomstock-backend exec prisma studio --port 3001 --hostname 0.0.0.0 --browser none
    restart: 'no'

volumes:
  data:
