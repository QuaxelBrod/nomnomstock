services:
  offers:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    command: sh -c "pnpm install --frozen-lockfile && pnpm --filter nomnomstock-offers run prisma:generate && pnpm --filter nomnomstock-offers run dev"
    environment:
      NODE_ENV: development
      PORT: 3010
      OFFERS_DATABASE_URL: file:/data/offers/offers.db
      OFFERS_SERVICE_TOKEN: ${OFFERS_SERVICE_TOKEN:-dev-offers-token}
      OFFERS_SCHEDULER_ENABLED: ${OFFERS_SCHEDULER_ENABLED:-true}
      OFFERS_REFRESH_HOUR: ${OFFERS_REFRESH_HOUR:-6}
      OFFERS_HISTORY_RETENTION_DAYS: ${OFFERS_HISTORY_RETENTION_DAYS:-180}
      OFFERS_VISION_ENABLED: ${OFFERS_VISION_ENABLED:-false}
      OFFERS_VISION_BASE_URL: ${OFFERS_VISION_BASE_URL:-}
      OFFERS_VISION_MODEL: ${OFFERS_VISION_MODEL:-}
      OFFERS_VISION_API_KEY: ${OFFERS_VISION_API_KEY:-}
      OFFERS_FETCH_TIMEOUT_MS: ${OFFERS_FETCH_TIMEOUT_MS:-15000}
      OFFERS_IMAGE_LOOKUP_ENABLED: ${OFFERS_IMAGE_LOOKUP_ENABLED:-true}
      OFFERS_IMAGE_LOOKUP_MAX_PER_REFRESH: ${OFFERS_IMAGE_LOOKUP_MAX_PER_REFRESH:-10}
      OFFERS_IMAGE_LOOKUP_DELAY_MS: ${OFFERS_IMAGE_LOOKUP_DELAY_MS:-6500}
      OFFERS_IMAGE_LOOKUP_TIMEOUT_MS: ${OFFERS_IMAGE_LOOKUP_TIMEOUT_MS:-5000}
      OFFERS_IMAGE_LOOKUP_USER_AGENT: ${OFFERS_IMAGE_LOOKUP_USER_AGENT:-}
      OFFERS_BROWSER_SCRAPER_ENABLED: ${OFFERS_BROWSER_SCRAPER_ENABLED:-false}
      OFFERS_BROWSER_RETAILERS: ${OFFERS_BROWSER_RETAILERS:-marktkauf}
      OFFERS_BROWSER_MAX_TARGETS_PER_RUN: ${OFFERS_BROWSER_MAX_TARGETS_PER_RUN:-5}
      OFFERS_BROWSER_SNAPSHOT_DIR: ${OFFERS_BROWSER_SNAPSHOT_DIR:-/data/offers/browser-snapshots}
      OFFERS_BROWSER_WS_ENDPOINT: ${OFFERS_BROWSER_WS_ENDPOINT:-}
      OFFERS_BROWSER_CONNECT_TIMEOUT_MS: ${OFFERS_BROWSER_CONNECT_TIMEOUT_MS:-30000}
      OFFERS_BROWSER_TIMEOUT_MS: ${OFFERS_BROWSER_TIMEOUT_MS:-45000}
      OFFERS_BROWSER_SETTLE_MS: ${OFFERS_BROWSER_SETTLE_MS:-2500}
      OFFERS_BROWSER_HEADLESS: ${OFFERS_BROWSER_HEADLESS:-true}
      OFFERS_BROWSER_USER_AGENT: ${OFFERS_BROWSER_USER_AGENT:-}
    volumes:
      - ./:/app
      - pnpm-store:/pnpm/store
      - node-modules:/app/node_modules
      - offers-node-modules:/app/services/offers/node_modules
      - offers-data:/data/offers
    expose:
      - "3010"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - offers
    working_dir: /app
    command: sh -c "pnpm install --frozen-lockfile && pnpm --filter nomnomstock-backend exec prisma generate && pnpm --filter nomnomstock-backend exec prisma migrate deploy && pnpm --filter nomnomstock-backend run prisma:seed && pnpm --filter nomnomstock-backend run dev"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: file:/data/nomnom.db
      APP_URL: ${APP_URL:-http://localhost:3000}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      BASE_PATH: ${BASE_PATH:-}
      NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:3001/api/v1}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-nextauth-secret-change-me}
      ADMIN_MAINTENANCE_TOKEN: ${ADMIN_MAINTENANCE_TOKEN:-dev-admin-token}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-admin@example.com}
      EMAIL_AUTH_ENABLED: ${EMAIL_AUTH_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      UPLOAD_DIR: /data/uploads
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_ENABLED: ${LLM_ENABLED:-false}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS:-60000}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-1024}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.7}
      OLLAMA_URL: ${OLLAMA_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-cortex}
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-false}
      OFFERS_SERVICE_URL: ${OFFERS_SERVICE_URL:-http://offers:3010}
      OFFERS_SERVICE_TOKEN: ${OFFERS_SERVICE_TOKEN:-dev-offers-token}
    volumes:
      - ./:/app
      - pnpm-store:/pnpm/store
      - node-modules:/app/node_modules
      - backend-node-modules:/app/backend/node_modules
      - web-node-modules:/app/frontends/web/node_modules
      - shared-node-modules:/app/packages/shared/node_modules
      - offers-node-modules:/app/services/offers/node_modules
      - data:/data
    ports:
      - "3001:3001"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - backend
    working_dir: /app
    command: sh -c "pnpm install --frozen-lockfile && pnpm --filter nomnomstock-web run dev --hostname 0.0.0.0 --port 3000"
    environment:
      NODE_ENV: development
      APP_URL: ${APP_URL:-http://localhost:3000}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-nextauth-secret-change-me}
      BASE_PATH: ${BASE_PATH:-}
      NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
      BACKEND_URL: ${BACKEND_URL:-http://backend:3001}
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://backend:3001}
    volumes:
      - ./:/app
      - pnpm-store:/pnpm/store
      - node-modules:/app/node_modules
      - backend-node-modules:/app/backend/node_modules
      - web-node-modules:/app/frontends/web/node_modules
      - shared-node-modules:/app/packages/shared/node_modules
    ports:
      - "3000:3000"

volumes:
  pnpm-store:
  node-modules:
  backend-node-modules:
  web-node-modules:
  shared-node-modules:
  offers-node-modules:
  data:
  offers-data:
