services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    command: sh -c "pnpm install --frozen-lockfile && pnpm --filter nomnomstock-backend exec prisma generate && pnpm --filter nomnomstock-backend exec prisma migrate deploy && pnpm --filter nomnomstock-backend run prisma:seed && pnpm --filter nomnomstock-backend run dev"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: file:/data/nomnom.db
      APP_URL: ${APP_URL:-http://localhost:3000}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:3001/api/v1}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-nextauth-secret-change-me}
      ADMIN_MAINTENANCE_TOKEN: ${ADMIN_MAINTENANCE_TOKEN:-dev-admin-token}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-admin@example.com}
      EMAIL_AUTH_ENABLED: ${EMAIL_AUTH_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      UPLOAD_DIR: /data/uploads
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_ENABLED: ${LLM_ENABLED:-false}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS:-60000}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-1024}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.7}
      OLLAMA_URL: ${OLLAMA_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-cortex}
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-false}
    volumes:
      - ./:/app
      - pnpm-store:/pnpm/store
      - node-modules:/app/node_modules
      - backend-node-modules:/app/backend/node_modules
      - web-node-modules:/app/frontends/web/node_modules
      - shared-node-modules:/app/packages/shared/node_modules
      - data:/data
    ports:
      - "3001:3001"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - backend
    working_dir: /app
    command: sh -c "pnpm install --frozen-lockfile && pnpm --filter nomnomstock-web run dev --hostname 0.0.0.0 --port 3000"
    environment:
      NODE_ENV: development
      APP_URL: ${APP_URL:-http://localhost:3000}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-nextauth-secret-change-me}
      BASE_PATH: ${BASE_PATH:-}
      NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
      BACKEND_URL: ${BACKEND_URL:-http://backend:3001}
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://backend:3001}
    volumes:
      - ./:/app
      - pnpm-store:/pnpm/store
      - node-modules:/app/node_modules
      - backend-node-modules:/app/backend/node_modules
      - web-node-modules:/app/frontends/web/node_modules
      - shared-node-modules:/app/packages/shared/node_modules
    ports:
      - "3000:3000"

volumes:
  pnpm-store:
  node-modules:
  backend-node-modules:
  web-node-modules:
  shared-node-modules:
  data:
